services:
  boardroom:
    # Prebuilt image from GHCR. Uncomment `build:` below to build from source
    # instead (useful during development).
    image: ghcr.io/wasteland-solutions/boardroom:latest
    # build:
    #   context: ..
    #   dockerfile: docker/Dockerfile
    container_name: boardroom
    restart: unless-stopped

    ports:
      - "3000:3000"
      # Terminal WebSocket endpoint served by the agent worker. The browser
      # connects directly to this port (with an HMAC token minted by the
      # Next.js side after auth). Change AGENT_WORKER_WS_PORT in .env if
      # you need to move it.
      - "9099:9099"

    env_file:
      - .env

    # Reminders of the env vars the app needs. The authoritative values live
    # in your .env — these lines just make the intent explicit.
    environment:
      - NODE_ENV=production
      - DATABASE_PATH=/app/data/boardroom.db
      - AGENT_WORKER_SOCKET=/tmp/boardroom-agent.sock
      - AGENT_WORKER_WS_PORT=9099
      - PORT=3000

    volumes:
      # SQLite database + WAL files. Survives `docker compose down`.
      - ./data:/app/data

      # ------------------------------------------------------------------
      # WORKING DIRECTORIES — the key step most people miss.
      # ------------------------------------------------------------------
      # Claude Code runs *inside* the container, so it can only see files
      # under paths you explicitly mount into it from your host machine.
      # Mount any project you want to work on, then add the *container-side*
      # path (e.g. /workspaces/my-app) in Settings → Working directories.
      #
      # Default mount: a single host folder where you drop symlinks or
      # whole projects. Everything under ./workspaces on the host becomes
      # visible at /workspaces in the container.
      - ./workspaces:/workspaces
      #
      # ALTERNATIVE: mount specific projects directly by uncommenting and
      # editing lines like these, then add the container-side path (the
      # part after the colon) in Settings:
      # - /Users/you/Code/my-app:/workspaces/my-app
      # - /Users/you/Code/website:/workspaces/website
      # - /Users/you/notes:/workspaces/notes
      #
      # Credentials (Anthropic API key OR Claude Code OAuth token) are
      # configured in Settings → Credentials after sign-in. No host
      # credential mounts required.

    # Recommended security tightening for a single-user self-host.
    # Comment out if it gets in your way.
    security_opt:
      - no-new-privileges:true

    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://localhost:3000/api/auth/session').then(r=>process.exit(r.ok||r.status===401?0:1)).catch(()=>process.exit(1))\""]
      interval: 30s
      timeout: 5s
      start_period: 30s
      retries: 3

# Named volumes are unnecessary here — the bind mounts above already survive
# container restarts and make the data visible on the host for backup.
